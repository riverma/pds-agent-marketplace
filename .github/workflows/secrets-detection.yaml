name: Secret Detection Workflow
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    secret-detection:
        runs-on: ubuntu-latest
        steps:
            -
                name: Checkout code
                uses: actions/checkout@v4
            -
                name: Install necessary packages
                run: |
                    pip install detect-secrets==1.5.0
            -
                name: Check for secrets
                run: |
                    if [ ! -f .secrets.baseline ]; then
                        echo "❌ No .secrets.baseline found. Run 'scripts/detect_secrets_baseline.sh scan' locally, audit the results, and commit the baseline." >&2
                        exit 1
                    fi
                    scripts/detect_secrets_baseline.sh
